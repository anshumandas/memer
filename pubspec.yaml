name: memer
description: >-
  A client-only Flutter app for making layered memes (background, text,
  hyperlinks, images, callout bubbles) with an in-app crop / rotate /
  background-removal editor, then sharing the PNG to any social network
  via the native share sheet. No backend required.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.9.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

  # Native OS share sheet — posts to whatever app the user has installed
  # (Instagram, X, WhatsApp, Facebook, …) using their own logins.
  # Pinned to 12.x: 13+ requires Dart 3.10, but Flutter 3.35.x ships 3.9.
  share_plus: ^12.0.0

  # Cross-platform file picking for image layers / image-editor source.
  # file_selector works on Android, iOS, web, Windows, macOS and Linux.
  file_selector: ^1.0.3

  # Pure-Dart HSV/wheel colour picker (works on every platform).
  flutter_colorpicker: ^1.1.0

  # Cross-platform URL opener for the meme's optional clickable hyperlink
  # (works in the editor preview — the exported PNG of course can't carry
  # a live link, so the URL is also appended to the share caption).
  url_launcher: ^6.3.0

  # Pure-Dart image processing — crops, bakes rotations, applies the alpha
  # mask produced by the background-removal painter. Works on every target
  # (no native plugins, no FFI), so the image tools stay cross-platform.
  # Pinned to 4.8.x: 4.9+ requires a newer `meta` than the Flutter SDK ships.
  image: ">=4.8.0 <4.9.0"

  # Web Platform APIs (replaces the legacy `dart:html`). Used only inside a
  # conditional import for the browser PNG-download saver.
  web: ^1.1.0

  # HTTP client for the optional GenAI background/object-removal feature
  # (BYO Hugging Face token; nothing is sent unless the user opts in).
  http: ^1.2.0

  # Secure key/value store for the user-supplied Hugging Face token. Uses
  # Keychain (iOS/macOS), Keystore (Android), DPAPI (Windows), libsecret
  # (Linux), SubtleCrypto-backed IndexedDB (web). Aligns with the Phase-3
  # BYO-credentials approach — we never ship our own keys.
  flutter_secure_storage: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/templates/
