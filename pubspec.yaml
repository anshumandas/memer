name: memer
description: >-
  A client-only Flutter app for making simple memes (background colour, text,
  optional background image, and optional speech-bubble callouts) and sharing
  them to any social network via the native share sheet. No backend required.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # Native OS share sheet — posts to whatever app the user has installed
  # (Instagram, X, WhatsApp, Facebook, …) using their own logins.
  share_plus: ^10.1.2

  # Cross-platform file picking for the optional background image.
  # file_selector works on Android, iOS, web, Windows, macOS and Linux.
  file_selector: ^1.0.3

  # Pure-Dart HSV/wheel colour picker (works on every platform).
  flutter_colorpicker: ^1.1.0

  # Cross-platform URL opener for the meme's optional clickable hyperlink
  # (works in the editor preview — the exported PNG of course can't carry
  # a live link, so the URL is also appended to the share caption).
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
